# Cloudflare Pages + Functions 配置
# 部署：在仓库根执行 `wrangler pages deploy apps/pwa/dist`
# 本地开发：`wrangler pages dev apps/pwa/dist`
#
# 注意：本文件用于本地 wrangler 开发与 KV 绑定。
# 在 Cloudflare Pages 控制台生产环境部署时，KV 绑定需在
# Dashboard：站设 → 函数 → KV 命名空间绑定 中添加变量名 QUOTE_CACHE。

name = "my-bills"
pages_build_output_dir = "apps/pwa/dist"

# 兼容 Node 风格的 fetch/TextDecoder 等（Pages Functions 默认支持，此处显式声明）
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# KV 命名空间绑定（本地用）。生产请在 Pages Dashboard 绑定同名变量 QUOTE_CACHE。
# 注意：binding 必须叫 QUOTE_CACHE，与代码里 env.QUOTE_CACHE 一致。
[[kv_namespaces]]
binding = "QUOTE_CACHE"
id = "a025d8ed33bf444c9ec7df45993aae92"

# 本地开发预检用 KV（wrangler dev 时使用，可选；部署到 Pages 生产后由 Dashboard 绑定生效）
# 若你已创建专门的 preview 命名空间，把下面 preview_id 替换掉；否则可暂时复用上面的 id。
# [[kv_namespaces]]
# binding = "QUOTE_CACHE"
# id = "a025d8ed33bf444c9ec7df45993aae92"
# preview_id = "<ID_OF_PREVIEW_KV_NAMESPACE_FOR_LOCAL_DEVELOPMENT>"

# 本地开发可选：设置允许的 CORS 来源（_middleware.ts 当前默认 *）
# [vars]
# ALLOWED_ORIGINS = "https://your-domain.com"
